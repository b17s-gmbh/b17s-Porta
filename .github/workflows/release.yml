name: Release

# Release is driven by CHANGELOG.md and triggered manually from the Actions tab
# (or `gh workflow run release.yml`). It reads the top released version from
# CHANGELOG.md and, if it has not been released yet, builds/tests/packs, pushes to
# NuGet.org, then creates the immutable git tag and GitHub Release. Because the tag
# is only created after a successful publish, reruns after a partial failure are
# safe and idempotent.
#
# Who can release is enforced by the 'nuget-release' environment's protection rules
# (required reviewers / deployment branch policy), which are applied server-side
# regardless of branch contents — an in-workflow guard would not be, since anyone
# able to dispatch could edit it out on a branch.
on:
  workflow_dispatch:

# Never run two releases at once; do not cancel an in-progress publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    environment: nuget-release

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from CHANGELOG
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Top released heading (the '## [Unreleased]' heading has no digits and is skipped).
          package_version=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\]' CHANGELOG.md \
            | head -n 1 \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?' || true)
          if [ -z "$package_version" ]; then
            echo "::error::No released version heading (e.g. '## [1.0.0]') found in CHANGELOG.md."
            exit 1
          fi

          tag="v${package_version}"
          # Base version with any pre-release suffix stripped.
          base_version="${package_version%%-*}"
          # AssemblyVersion/FileVersion must be numeric (a.b.c[.d]); use the base version.
          assembly_version="${base_version}.0"

          echo "Tag:              $tag"
          echo "Package version:  $package_version"
          echo "Base version:     $base_version"
          echo "Assembly version: $assembly_version"
          {
            echo "tag=$tag"
            echo "package_version=$package_version"
            echo "base_version=$base_version"
            echo "assembly_version=$assembly_version"
          } >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        id: tag_check
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          exists=false
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            exists=true
          fi
          if [ "$exists" = "true" ]; then
            echo "::notice::Tag '${TAG}' already exists — version already released. Skipping the rest of the workflow."
          else
            echo "::notice::Tag '${TAG}' not found — proceeding with release."
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Validate CHANGELOG
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail

          top_version="$PACKAGE_VERSION"

          # The Unreleased section must be empty (no content between '## [Unreleased]' and the next '## ').
          unreleased_body=$(awk '
            /^## \[Unreleased\]/ { in_unreleased = 1; next }
            in_unreleased && /^## / { exit }
            in_unreleased { print }
          ' CHANGELOG.md | tr -d '[:space:]')
          if [ -n "$unreleased_body" ]; then
            echo "::error::'## [Unreleased]' section in CHANGELOG.md is not empty. Move its entries under the '## [$PACKAGE_VERSION]' heading before releasing."
            exit 1
          fi

          # Extract the release notes body (content under '## [X.Y.Z]' up to the next '## ').
          notes_file="$(mktemp)"
          awk -v ver="$top_version" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > "$notes_file"

          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}' "$notes_file" || true

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          echo "----- Release notes preview -----"
          cat "$notes_file"
          echo "---------------------------------"

      - name: Setup .NET
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        if: steps.tag_check.outputs.exists == 'false'
        run: dotnet restore b17s.Porta.slnx

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: >-
          dotnet build b17s.Porta.slnx
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.package_version }}
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:ContinuousIntegrationBuild=true

      - name: Test
        if: steps.tag_check.outputs.exists == 'false'
        run: >-
          dotnet test tests/b17s.Porta.Tests.csproj
          --configuration Release
          --no-build
          --
          --report-xunit-trx
          --report-xunit-trx-filename test-results.trx

      - name: Upload test results
        if: always() && steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Pack
        if: steps.tag_check.outputs.exists == 'false'
        run: >-
          dotnet pack src/b17s.Porta.csproj
          --configuration Release
          --no-build
          --output ./artifacts
          -p:Version=${{ steps.version.outputs.package_version }}
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}

      - name: Upload package artifact
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Check NuGet version does not exist
        id: nuget_check
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail
          # Flat container index lists all published versions for the (lowercased) package id.
          id_lower="b17s.porta"
          url="https://api.nuget.org/v3-flatcontainer/${id_lower}/index.json"
          exists=false
          if curl -fsSL "$url" -o nuget-versions.json 2>/dev/null; then
            if grep -qiF "\"${PACKAGE_VERSION}\"" nuget-versions.json; then
              exists=true
            fi
          fi
          if [ "$exists" = "true" ]; then
            echo "::warning::Version '${PACKAGE_VERSION}' already exists on NuGet.org — the push will be skipped (tag/release will still be created)."
          else
            echo "::notice::Version '${PACKAGE_VERSION}' not found on NuGet.org — proceeding with push."
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Authenticate to NuGet.org via trusted publishing
        id: nuget-login
        if: steps.tag_check.outputs.exists == 'false' && steps.nuget_check.outputs.exists == 'false'
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        if: steps.tag_check.outputs.exists == 'false' && steps.nuget_check.outputs.exists == 'false'
        run: >-
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        if: steps.tag_check.outputs.exists == 'false' && steps.nuget_check.outputs.exists == 'false'
        run: >-
          dotnet nuget push ./artifacts/*.snupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/${TAG}"

      - name: Create draft GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
        run: |
          set -euo pipefail
          # Draft first, attach assets, then publish — GitHub's recommended flow for
          # immutable releases (assets cannot change once a release is published).
          prerelease_flag=""
          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            $prerelease_flag \
            ./artifacts/*.nupkg \
            ./artifacts/*.snupkg

      - name: Publish GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false
